{% extends 'base.html' %}

{% block content %}
<div class="container mt-5" style="max-width: 400px;">
    <h3 class="text-center mb-4">Sign Up</h3>
    <form method="POST">
        {% csrf_token %}

        {{ form.non_field_errors }}

        <div class="mb-3">{{ form.username }}</div>
        <div class="mb-3">{{ form.first_name }}</div>
        <div class="mb-3">{{ form.last_name }}</div>
        <div class="mb-3">{{ form.email }}</div>
        <div class="mb-3">{{ form.password1 }}</div>
        <div class="mb-3">{{ form.password2 }}</div>

        <button class="btn btn-primary w-100">Ro'yxatdan o'tish</button>
    </form>

    <p class="text-center mt-3">
        Allaqachon ro'yxatdan o'tganmisiz? <a href="{% url 'login' %}">Login</a>
    </p>
</div>
{% endblock %}
