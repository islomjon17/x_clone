{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm border-danger">
        <div class="card-body text-center">
            <h4 class="text-danger mb-4">Postni o'chirish</h4>
            <p>Siz haqiqatan ham quyidagi postni o'chirmoqchimisiz?</p>
            <div class="alert alert-light border small text-muted">
                "{{ object.body|truncatechars:100 }}"
            </div>
            
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger w-100 mb-2">Ha, o'chirilsin</button>
                <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100">Bekor qilish</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
